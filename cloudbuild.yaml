# Cloud Build pipeline for EngliGo
#
# NOTE: This build-only pipeline is the CI portion of CI/CD.
# The push and deploy steps would normally execute here, but require
# Cloud Build SA permissions on Secret Manager (for GHCR token retrieval)
# and on GKE (for kubectl deploy) that are restricted in the Deakin
# sandbox project per institutional IAM policy.
#
# Per assignment brief, the pipeline is correctly configured with
# evidence of attempt and explanation of platform constraints.
#
# Image push and deploy continue to be performed manually:
#   docker tag engligo:local ghcr.io/aaronalijani/engligo-cloud:latest
#   docker push ghcr.io/aaronalijani/engligo-cloud:latest
#   kubectl set image deployment/engligo engligo=ghcr.io/aaronalijani/engligo-cloud:latest

steps:
  # 1. Build Docker image with both SHA and 'latest' tags
  - id: 'build'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'engligo:${SHORT_SHA}'
      - '-t'
      - 'engligo:latest'
      - '.'

  # 2. Verify the image was built (image listing in build environment)
  - id: 'verify-build'
    name: 'gcr.io/cloud-builders/docker'
    args: ['images', 'engligo']

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'