# ============================================================================
# EngliGo - End-to-end CI/CD pipeline for SIT737 10.2HD
# ----------------------------------------------------------------------------
# Replaces Stage 1's build-only Cloud Build pipeline. On every push to main,
# this workflow:
#   1. Builds the multi-stage Docker image
#   2. Pushes it to GitHub Container Registry (both :sha and :latest tags)
#   3. Authenticates to Google Cloud using a service account key
#      (Workload Identity Federation was attempted but blocked by Deakin's
#      setIamPolicy restriction; documented in 10.2HD report)
#   4. Connects to the GKE cluster
#   5. Updates the Deployment to use the new SHA-tagged image
#   6. Waits for the rollout to complete (or fails the workflow)
#   7. Runs a smoke test against the LoadBalancer
#
# This closes the gap identified in 7.2HD feedback: the push and deploy
# stages are now fully automated and tied to a single 'git push' trigger.
# ============================================================================

name: Build and Deploy to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering from the Actions tab

env:
  IMAGE_NAME: ghcr.io/aaronalijani/engligo-cloud
  DEPLOYMENT_NAME: engligo
  CONTAINER_NAME: engligo

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_ZONE }}

      - name: Update Deployment image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            --timeout=300s

      - name: Verify deployed image
        run: |
          DEPLOYED_IMAGE=$(kubectl get deployment/${{ env.DEPLOYMENT_NAME }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Deployed image: $DEPLOYED_IMAGE"
          EXPECTED="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          if [ "$DEPLOYED_IMAGE" = "$EXPECTED" ]; then
            echo "Image matches expected SHA tag"
          else
            echo "Mismatch: expected $EXPECTED"
            exit 1
          fi

      - name: Smoke test /health endpoint
        run: |
          EXTERNAL_IP=$(kubectl get svc engligo-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Smoke-testing http://$EXTERNAL_IP/health"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 "http://$EXTERNAL_IP/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Smoke test passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 5 attempts"
          exit 1

      - name: Workflow summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ vars.GKE_CLUSTER }}\` (${{ vars.GKE_ZONE }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | \`${{ env.DEPLOYMENT_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} by ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY