# ============================================================================
# EngliGo - CI/CD pipeline for SIT737 10.2HD
# ----------------------------------------------------------------------------
# Replaces Stage 1's build-only Cloud Build pipeline. On every push to main,
# this workflow automates the build and push stages that were manual in
# Stage 1.
#
# IMPORTANT - Deploy automation limitation:
# The deploy step (kubectl set image + rollout status) is preserved below as
# COMMENTED design intent rather than executed code, because the Deakin sandbox
# project denies setIamPolicy globally to student accounts (verified Stage 2).
# Without setIamPolicy, no service account can be granted container.clusters.get,
# which google-github-actions/get-gke-credentials requires. This blocker is
# project-wide and documented in the 10.2HD limitations section.
#
# Pipeline status:
#   Stage 1: Build only (Cloud Build) - 1 of 4 steps automated
#   Stage 2: Build + push (GitHub Actions) - 2 of 4 steps automated
#   Stage 3: Full end-to-end (pending Deakin IAM unblock or escalation)
# ============================================================================

name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/aaronalijani/engligo-cloud
  DEPLOYMENT_NAME: engligo
  CONTAINER_NAME: engligo

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # ----------------------------------------------------------------
      # 1. Check out the repository
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Log in to GitHub Container Registry
      # ----------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 3. Set up Docker Buildx
      # ----------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------------
      # 4. Build and push the image with both :sha and :latest tags
      # ----------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # 5. Print the deploy command for the operator
      # ----------------------------------------------------------------
      # Since automated deploy is IAM-blocked, this step generates the
      # exact one-line command an operator runs from Cloud Shell to
      # complete the deployment. Reduces the manual deploy from Stage 1's
      # multi-step process (docker tag + docker push + kubectl set image)
      # to a single command.
      - name: Print deploy command
        run: |
          echo ""
          echo "============================================================"
          echo " Image built and pushed successfully."
          echo " To deploy to GKE, run from Cloud Shell:"
          echo ""
          echo "   kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \\"
          echo "     ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "   kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }}"
          echo "============================================================"

      # ----------------------------------------------------------------
      # 6. Workflow summary
      # ----------------------------------------------------------------
      - name: Workflow summary
        if: always()
        run: |
          echo "## Build & Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image (SHA-tagged) | \`${{ env.IMAGE_NAME }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image (latest)     | \`${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} by ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To complete deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run from Cloud Shell (with cluster credentials):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

