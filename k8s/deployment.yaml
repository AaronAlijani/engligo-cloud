apiVersion: apps/v1
kind: Deployment
metadata:
  name: engligo
  labels:
    app: engligo
spec:
  # Single replica because PVC is ReadWriteOnce (SQLite single-writer).
  # Stage 3: migrate to Cloud SQL for horizontal scaling.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: engligo
  template:
    metadata:
      labels:
        app: engligo
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: engligo
          image: ghcr.io/aaronalijani/engligo-cloud:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DB_PATH
              value: "/data/engligo.db"
            - name: TRUST_PROXY
              value: "true"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: engligo-secrets
                  key: SESSION_SECRET
          volumeMounts:
            - name: engligo-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # ============================================================
          # Stage 2 probe tuning:
          # - startupProbe (NEW) handles cold-start window: tolerates up
          #   to ~60s for cold image pulls (~9s) + Node.js + SQLite init
          #   (~3s). Disables liveness/readiness until app is up.
          # - livenessProbe TIGHTENED: periodSeconds 20 -> 10 detects
          #   crashes ~2x faster after startup completes.
          # - readinessProbe TIGHTENED: periodSeconds 10 -> 5 pulls a
          #   failing pod out of the LoadBalancer rotation faster.
          # All values are based on measured timings captured via
          # `kubectl get events` during pod restarts.
          # ============================================================
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: engligo-data
          persistentVolumeClaim:
            claimName: engligo-data-pvc