apiVersion: apps/v1
kind: Deployment
metadata:
  name: engligo
  labels:
    app: engligo
spec:
  # Single replica because PVC is ReadWriteOnce.
  replicas: 1
  strategy:
  # Recreate strategy is used to ensure that the old pod is fully terminated before a new one starts, which is important when using a ReadWriteOnce PVC to avoid conflicts.
    type: Recreate
  selector:
    matchLabels:
      app: engligo
  template:
    metadata:
      labels:
        app: engligo
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: engligo
          image: ghcr.io/aaronalijani/engligo-cloud:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DB_PATH
              value: "/data/engligo.db"
            - name: TRUST_PROXY
              value: "true"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: engligo-secrets
                  key: SESSION_SECRET
          volumeMounts:
            - name: engligo-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: engligo-data
          persistentVolumeClaim:
            claimName: engligo-data-pvc