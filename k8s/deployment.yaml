apiVersion: apps/v1
kind: Deployment
metadata:
  name: engligo
  labels:
    app: engligo
spec:
  # Stage 3: SQLite replaced by PostgreSQL sidecar.
  # ReadWriteOnce PVC constraint removed — RollingUpdate now safe.
  # HPA can scale beyond 1 replica.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: engligo
  template:
    metadata:
      labels:
        app: engligo
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # ----------------------------------------------------------------
      # initContainer: runs database_init.js once before app starts.
      # Waits for the postgres sidecar, then creates schema + seeds data.
      # ----------------------------------------------------------------
      initContainers:
        - name: db-init
          image: ghcr.io/aaronalijani/engligo-cloud:latest
          imagePullPolicy: Always
          command: ["node", "database_init.js"]
          env:
            - name: PG_HOST
              value: "localhost"
            - name: PG_PORT
              value: "5432"
            - name: PG_DB
              value: "engligo"
            - name: PG_USER
              value: "engligo"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: engligo-secrets
                  key: PG_PASSWORD

      containers:
        # ----------------------------------------------------------------
        # Main app container
        # ----------------------------------------------------------------
        - name: engligo
          image: ghcr.io/aaronalijani/engligo-cloud:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: TRUST_PROXY
              value: "true"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: engligo-secrets
                  key: SESSION_SECRET
            - name: PG_HOST
              value: "localhost"
            - name: PG_PORT
              value: "5432"
            - name: PG_DB
              value: "engligo"
            - name: PG_USER
              value: "engligo"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: engligo-secrets
                  key: PG_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # ============================================================
          # Stage 3 probe tuning (inherited from Stage 2 + adjusted):
          # - startupProbe: PostgreSQL sidecar adds ~5-10s to startup.
          #   60-second window is still sufficient.
          # - livenessProbe: 10s period (Stage 2 tuned value retained).
          # - readinessProbe: 5s period (Stage 2 tuned value retained).
          # ============================================================
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

        # ----------------------------------------------------------------
        # PostgreSQL sidecar
        # Shares localhost network with app container.
        # emptyDir volume provides ephemeral storage (resets on pod restart).
        # Note: for production, replace with Cloud SQL.
        # ----------------------------------------------------------------
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "engligo"
            - name: POSTGRES_USER
              value: "engligo"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: engligo-secrets
                  key: PG_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "engligo", "-d", "engligo"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

      volumes:
        # emptyDir: ephemeral — data resets on pod restart.
        # Sufficient for demo; Cloud SQL provides persistence in production.
        - name: pg-data
          emptyDir: {}