# ============================================================================
# EngliGo HorizontalPodAutoscaler (Stage 2)
# ----------------------------------------------------------------------------
# Scaffolds CPU-based horizontal autoscaling for the engligo Deployment.
#
# IMPORTANT: maxReplicas is currently capped at 1 because the persistence
# layer (SQLite-on-PVC with ReadWriteOnce access mode) cannot support
# multiple concurrent writers. The HPA architecture is present and
# observable via `kubectl get hpa`, but cannot scale beyond 1 in Stage 2.
#
# Stage 3 path: migrate to Cloud SQL (PostgreSQL), then change maxReplicas
# from 1 to 5 (or higher) - a single-line YAML change that unlocks real
# horizontal scaling without any other architectural rework.
#
# Why scaffold now: demonstrates the cloud-native principle of designing
# for elasticity (CNCF horizontal scaling pattern) even when current state
# does not require it, and makes the Stage 3 migration trivial.
# ============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engligo-hpa
  labels:
    app: engligo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engligo
  minReplicas: 1
  maxReplicas: 1    
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60