apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engligo-hpa
  labels:
    app: engligo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engligo
  minReplicas: 1
  # Stage 3: maxReplicas raised from 1 to 3.
  # SQLite single-writer constraint removed — PostgreSQL sidecar supports
  # concurrent connections from multiple pods.
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60